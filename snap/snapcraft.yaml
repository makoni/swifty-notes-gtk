name: swifty-notes
title: Swifty Notes
base: core24
version: "1.0.1"
summary: Native GTK markdown notes for Linux
description: |
  Swifty Notes is a native GTK/libadwaita markdown notes application for Linux.
  It keeps notes in plain files, supports a live native Markdown preview,
  autosave, drag-and-drop image import, and a storage-compatible CLI.
grade: stable
confinement: strict
license: MIT
website:
  - https://github.com/makoni/swifty-notes-gtk
issues:
  - https://github.com/makoni/swifty-notes-gtk/issues
contact:
  - https://github.com/makoni/swifty-notes-gtk/issues
source-code:
  - https://github.com/makoni/swifty-notes-gtk
icon: data/me.spaceinbox.swiftynotes.svg
platforms:
  amd64:
  arm64:

apps:
  swifty-notes:
    command: usr/bin/swiftynotes
    desktop: usr/share/applications/me.spaceinbox.swiftynotes.desktop
    extensions:
      - gnome

parts:
  swifty-notes:
    plugin: nil
    source: .
    build-packages:
      - appstream
      - binutils
      - curl
      - desktop-file-utils
      - git
      - gnupg2
      - libc6-dev
      - libcurl4-openssl-dev
      - libedit2
      - libgcc-13-dev
      - libgtk-4-dev
      - libgtksourceview-5-dev
      - libadwaita-1-dev
      - libncurses-dev
      - libpython3-dev
      - libsqlite3-0
      - libstdc++-13-dev
      - libxml2-dev
      - libz3-dev
      - pkg-config
      - tzdata
      - unzip
      - zlib1g-dev
    override-build: |
      set -eux

      swift_branch='swift-6.3-release'
      swift_version='swift-6.3-RELEASE'
      swift_platform='ubuntu24.04'
      swift_signing_key='52BB7E3DE28A71BE22EC05FFEF80A866B47A981F'

      case "$(dpkg --print-architecture)" in
        amd64)
          swift_arch_suffix=''
          ;;
        arm64)
          swift_arch_suffix='-aarch64'
          ;;
        *)
          echo "Unsupported architecture: $(dpkg --print-architecture)" >&2
          exit 1
          ;;
      esac

      swift_dir_name="${swift_version}-${swift_platform}${swift_arch_suffix}"
      swift_webdir="https://download.swift.org/${swift_branch}/${swift_platform//./}${swift_arch_suffix}"
      swift_bin_url="${swift_webdir}/${swift_version}/${swift_dir_name}.tar.gz"
      swift_toolchain_dir="${CRAFT_PART_BUILD}/swift-toolchain"
      export GNUPGHOME="$(mktemp -d)"

      curl -fsSL "${swift_bin_url}" -o swift.tar.gz
      curl -fsSL "${swift_bin_url}.sig" -o swift.tar.gz.sig
      gpg --batch --quiet --keyserver keyserver.ubuntu.com --recv-keys "${swift_signing_key}"
      gpg --batch --verify swift.tar.gz.sig swift.tar.gz

      rm -rf "${swift_toolchain_dir}"
      mkdir -p "${swift_toolchain_dir}"
      tar -xzf swift.tar.gz --directory "${swift_toolchain_dir}" --strip-components=1

      rm -rf "${GNUPGHOME}" swift.tar.gz swift.tar.gz.sig
      unset GNUPGHOME

      export PATH="${swift_toolchain_dir}/usr/bin:${PATH}"

      packaging/release/assemble-install-root.sh --dest "${CRAFT_PART_INSTALL}" --prefix /usr
