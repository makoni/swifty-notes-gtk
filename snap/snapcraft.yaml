name: swifty-notes
title: Swifty Notes
base: core24
version: "1.1.2"
summary: Native GTK markdown notes for Linux
description: |
  Swifty Notes is a native GTK/libadwaita markdown notes application for Linux.
  It keeps notes in plain files, supports a live native Markdown preview,
  autosave, drag-and-drop image import, and a storage-compatible CLI.
grade: stable
confinement: strict
license: MIT
website:
  - https://github.com/makoni/swifty-notes-gtk
issues:
  - https://github.com/makoni/swifty-notes-gtk/issues
contact:
  - https://github.com/makoni/swifty-notes-gtk/issues
source-code:
  - https://github.com/makoni/swifty-notes-gtk
icon: data/me.spaceinbox.swiftynotes.svg
platforms:
  amd64:
  arm64:

apps:
  swifty-notes:
    command: usr/bin/swiftynotes
    common-id: me.spaceinbox.swifty-notes
    desktop: usr/share/applications/me.spaceinbox.swifty-notes.desktop
    extensions:
      - gnome
    environment:
      # Snap interface policy auto-allows the strict-confined app to own
      # the session-bus name "<reverse-DNS>.<snap-name>". The canonical
      # GApplication id used everywhere else (Flatpak, native installs)
      # is "me.spaceinbox.swiftynotes" — the dash-stripped form does not
      # match the snap name "swifty-notes", so AppArmor blocks it. The
      # post-build patches below rename the desktop/metainfo/icon to the
      # snap-only "me.spaceinbox.swifty-notes" id, and this env override
      # makes GApplication register that matching id at runtime.
      SWIFTY_NOTES_APP_ID: me.spaceinbox.swifty-notes

parts:
  swifty-notes:
    plugin: nil
    source: .
    build-packages:
      - appstream
      - binutils
      - curl
      - desktop-file-utils
      - git
      - gnupg2
      - libc6-dev
      - libcurl4-openssl-dev
      - libedit2
      - libgcc-13-dev
      - libgtk-4-dev
      - libgtksourceview-5-dev
      - libadwaita-1-dev
      - libncurses-dev
      - libpython3-dev
      - libsqlite3-0
      - libstdc++-13-dev
      - libxml2-dev
      - libz3-dev
      - pkg-config
      - tzdata
      - unzip
      - zlib1g-dev
    override-build: |
      set -eux

      # Renames the canonical "me.spaceinbox.swiftynotes" identity files
      # (desktop entry, AppStream metainfo, hicolor icons, GTK Settings
      # schema) to "me.spaceinbox.swifty-notes" so the snap's D-Bus name,
      # desktop id, metainfo id and icon basename all share the same
      # snap-name suffix that AppArmor's auto-allow rule expects. Run
      # against the install root after the prebuilt or in-place build
      # has finished populating it. Idempotent.
      patch_app_id_for_snap() {
        local install_root="$1"
        local old_id="me.spaceinbox.swiftynotes"
        local new_id="me.spaceinbox.swifty-notes"

        if [ -f "${install_root}/usr/share/applications/${old_id}.desktop" ]; then
          sed -i \
            -e "s|^Icon=${old_id}\$|Icon=${new_id}|" \
            -e "s|^StartupWMClass=${old_id}\$|StartupWMClass=${new_id}|" \
            "${install_root}/usr/share/applications/${old_id}.desktop"
          mv "${install_root}/usr/share/applications/${old_id}.desktop" \
             "${install_root}/usr/share/applications/${new_id}.desktop"
        fi

        if [ -f "${install_root}/usr/share/metainfo/${old_id}.metainfo.xml" ]; then
          sed -i \
            -e "s|<id>${old_id}</id>|<id>${new_id}</id>|" \
            -e "s|<launchable type=\"desktop-id\">${old_id}.desktop</launchable>|<launchable type=\"desktop-id\">${new_id}.desktop</launchable>|" \
            "${install_root}/usr/share/metainfo/${old_id}.metainfo.xml"
          mv "${install_root}/usr/share/metainfo/${old_id}.metainfo.xml" \
             "${install_root}/usr/share/metainfo/${new_id}.metainfo.xml"
        fi

        find "${install_root}/usr/share/icons" -name "${old_id}.*" -type f 2>/dev/null | while read -r icon_path; do
          local icon_dir
          icon_dir="$(dirname "${icon_path}")"
          local extension="${icon_path##*.}"
          mv "${icon_path}" "${icon_dir}/${new_id}.${extension}"
        done
      }

      prebuilt_install_root='packaging/out/install-root-usr'
      if [ -x "${prebuilt_install_root}/usr/bin/swiftynotes" ] && [ -x "${prebuilt_install_root}/usr/libexec/swifty-notes/swiftynotes" ]; then
        mkdir -p "${CRAFT_PART_INSTALL}"
        cp -a "${prebuilt_install_root}/." "${CRAFT_PART_INSTALL}/"
        patch_app_id_for_snap "${CRAFT_PART_INSTALL}"
        exit 0
      fi

      # The GNOME extension injects SDK build paths under /snap/gnome-46-2404-sdk.
      # On amd64 those headers conflict with SwiftGlibc during source builds, so
      # build against the apt-provided development packages instead.
      export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      export XDG_DATA_DIRS=/usr/share
      unset \
        SNAPCRAFT_GNOME_SDK \
        ACLOCAL_PATH \
        CFLAGS \
        CPPFLAGS \
        CXXFLAGS \
        GDK_PIXBUF_MODULE_FILE \
        GETTEXTDATADIRS \
        GI_TYPELIB_PATH \
        LDFLAGS \
        LD_LIBRARY_PATH \
        LIBRARY_PATH \
        PKG_CONFIG_LIBDIR \
        PKG_CONFIG_PATH \
        PYTHONPATH

      swift_branch='swift-6.2.2-release'
      swift_version='swift-6.2.2-RELEASE'
      swift_platform='ubuntu24.04'
      swift_signing_key='52BB7E3DE28A71BE22EC05FFEF80A866B47A981F'

      case "$(dpkg --print-architecture)" in
        amd64)
          swift_arch_suffix=''
          ;;
        arm64)
          swift_arch_suffix='-aarch64'
          ;;
        *)
          echo "Unsupported architecture: $(dpkg --print-architecture)" >&2
          exit 1
          ;;
      esac

      swift_dir_name="${swift_version}-${swift_platform}${swift_arch_suffix}"
      swift_webdir="https://download.swift.org/${swift_branch}/${swift_platform//./}${swift_arch_suffix}"
      swift_bin_url="${swift_webdir}/${swift_version}/${swift_dir_name}.tar.gz"
      swift_toolchain_dir="${CRAFT_PART_BUILD}/swift-toolchain"
      export GNUPGHOME="$(mktemp -d)"

      curl -fsSL "${swift_bin_url}" -o swift.tar.gz
      curl -fsSL "${swift_bin_url}.sig" -o swift.tar.gz.sig
      gpg --batch --quiet --keyserver keyserver.ubuntu.com --recv-keys "${swift_signing_key}"
      gpg --batch --verify swift.tar.gz.sig swift.tar.gz

      rm -rf "${swift_toolchain_dir}"
      mkdir -p "${swift_toolchain_dir}"
      tar -xzf swift.tar.gz --directory "${swift_toolchain_dir}" --strip-components=1

      rm -rf "${GNUPGHOME}" swift.tar.gz swift.tar.gz.sig
      unset GNUPGHOME

      export PATH="${swift_toolchain_dir}/usr/bin:${PATH}"

      packaging/release/assemble-install-root.sh --dest "${CRAFT_PART_INSTALL}" --prefix /usr
      patch_app_id_for_snap "${CRAFT_PART_INSTALL}"
