name: Release Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to stamp into package metadata
        required: true
        default: "1.0.0"
        type: string

permissions:
  contents: read

jobs:
  verify-project:
    name: Verify project (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            at-spi2-core \
            dbus \
            dbus-user-session \
            libadwaita-1-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            xvfb

      - name: Verify project
        run: |
          swift build
          xvfb-run -a dbus-run-session -- bash -lc \
            "swift test --filter 'CLICommandTests|CLITests|MainWindowActionsTests|MainWindowCoreTests|MarkdownFormattingTests|NoteModelAndRendererTests|RepositoryStateTests|SettingsStoreTests' --no-parallel"

  prepare-install-roots:
    name: Prepare install root (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: verify-project
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            desktop-file-utils \
            libadwaita-1-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev

      - name: Verify project
        run: |
          swift build
          swift test --filter 'CLICommandTests|CLITests|NoteModelAndRendererTests|RepositoryStateTests|SettingsStoreTests' --no-parallel

      - name: Assemble /usr install root
        run: |
          packaging/release/assemble-install-root.sh \
            --version "${{ inputs.version }}" \
            --repo-slug "${{ github.repository }}" \
            --repo-ref "${{ github.sha }}" \
            --dest packaging/out/install-root-usr \
            --prefix /usr

      - name: Archive /usr install root
        run: |
          tar -C packaging/out/install-root-usr -czf \
            "packaging/out/swifty-notes-gtk-${{ inputs.version }}-linux-${{ matrix.arch }}-install-root.tar.gz" \
            .

      - name: Upload /usr install root
        uses: actions/upload-artifact@v7
        with:
          name: swifty-notes-gtk-${{ inputs.version }}-linux-${{ matrix.arch }}-install-root.tar.gz
          path: packaging/out/swifty-notes-gtk-${{ inputs.version }}-linux-${{ matrix.arch }}-install-root.tar.gz

  build-deb:
    name: Build Debian package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare-install-roots
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download /usr install root
        uses: actions/download-artifact@v8
        with:
          name: swifty-notes-gtk-${{ inputs.version }}-linux-${{ matrix.arch }}-install-root.tar.gz
          path: packaging/out/install-root-archive

      - name: Extract /usr install root
        run: |
          rm -rf packaging/out/install-root-usr
          mkdir -p packaging/out/install-root-usr
          tar -C packaging/out/install-root-usr -xzf \
            "packaging/out/install-root-archive/swifty-notes-gtk-${{ inputs.version }}-linux-${{ matrix.arch }}-install-root.tar.gz"

      - name: Build Debian package
        run: |
          packaging/release/build-deb.sh \
            --version "${{ inputs.version }}" \
            --install-root packaging/out/install-root-usr \
            --output packaging/out/deb

      - name: Resolve Debian artifact
        id: deb-artifact
        run: |
          set -- packaging/out/deb/*.deb
          if [ "$#" -ne 1 ] || [ ! -f "$1" ]; then
            echo "Expected exactly one Debian artifact, found: $*" >&2
            exit 1
          fi
          echo "path=$1" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$1")" >> "$GITHUB_OUTPUT"

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.deb-artifact.outputs.name }}
          path: ${{ steps.deb-artifact.outputs.path }}

  build-rpm:
    name: Build RPM package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare-install-roots
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install RPM build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Download /usr install root
        uses: actions/download-artifact@v8
        with:
          name: swifty-notes-gtk-${{ inputs.version }}-linux-${{ matrix.arch }}-install-root.tar.gz
          path: packaging/out/install-root-archive

      - name: Extract /usr install root
        run: |
          rm -rf packaging/out/install-root-usr
          mkdir -p packaging/out/install-root-usr
          tar -C packaging/out/install-root-usr -xzf \
            "packaging/out/install-root-archive/swifty-notes-gtk-${{ inputs.version }}-linux-${{ matrix.arch }}-install-root.tar.gz"

      - name: Build RPM package
        run: |
          packaging/release/build-rpm.sh \
            --version "${{ inputs.version }}" \
            --install-root packaging/out/install-root-usr \
            --output packaging/out/rpm

      - name: Resolve RPM artifact
        id: rpm-artifact
        run: |
          set -- packaging/out/rpm/*.rpm
          if [ "$#" -ne 1 ] || [ ! -f "$1" ]; then
            echo "Expected exactly one RPM artifact, found: $*" >&2
            exit 1
          fi
          echo "path=$1" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$1")" >> "$GITHUB_OUTPUT"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.rpm-artifact.outputs.name }}
          path: ${{ steps.rpm-artifact.outputs.path }}

  build-flatpak:
    name: Build Flatpak bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: verify-project
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Render Flatpak manifest
        run: |
          packaging/release/render-flatpak-manifest.sh \
            --version "${{ inputs.version }}" \
            --repo-slug "${{ github.repository }}" \
            --repo-ref "${{ github.sha }}" \
            --source-path ../../.. \
            --output packaging/out/flatpak/me.spaceinbox.swiftynotes.yml

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/out/flatpak/me.spaceinbox.swiftynotes.yml
          bundle: swifty-notes-gtk-${{ inputs.version }}-${{ matrix.arch }}.flatpak
          branch: stable
          build-dir: packaging/out/flatpak/build
          repo-dir: packaging/out/flatpak/repo
          state-dir: packaging/out/flatpak/state
          cache-key: flatpak-builder-${{ matrix.arch }}-${{ github.sha }}
          mirror-screenshots-url: https://dl.flathub.org/media/
          upload-artifact: false
          verbose: true
          arch: ${{ matrix.arch }}

      - name: Install Flatpak linter
        run: |
          flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          for attempt in 1 2 3; do
            if flatpak install -y flathub org.flatpak.Builder; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Lint Flatpak manifest
        run: cd packaging/out/flatpak && flatpak run --command=flatpak-builder-lint org.flatpak.Builder manifest me.spaceinbox.swiftynotes.yml

      - name: Lint Flatpak repo
        run: cd packaging/out/flatpak && flatpak run --command=flatpak-builder-lint org.flatpak.Builder repo repo

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: swifty-notes-gtk-${{ inputs.version }}-${{ matrix.arch }}.flatpak
          path: swifty-notes-gtk-${{ inputs.version }}-${{ matrix.arch }}.flatpak

  build-snap:
    name: Build snap package (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: prepare-install-roots
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            install_root_arch: x86_64
            runner: ubuntu-24.04
          - platform: arm64
            install_root_arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download /usr install root
        uses: actions/download-artifact@v8
        with:
          name: swifty-notes-gtk-${{ inputs.version }}-linux-${{ matrix.install_root_arch }}-install-root.tar.gz
          path: packaging/out/install-root-archive

      - name: Extract /usr install root
        run: |
          rm -rf packaging/out/install-root-usr
          mkdir -p packaging/out/install-root-usr
          tar -C packaging/out/install-root-usr -xzf \
            "packaging/out/install-root-archive/swifty-notes-gtk-${{ inputs.version }}-linux-${{ matrix.install_root_arch }}-install-root.tar.gz"

      - name: Stamp Snap version
        run: |
          sed -i 's/^version: .*/version: "${{ inputs.version }}"/' snap/snapcraft.yaml

      - name: Restore Snap executable bits
        run: |
          chmod 755 \
            packaging/out/install-root-usr/usr/bin/swiftynotes \
            packaging/out/install-root-usr/usr/libexec/swifty-notes/swiftynotes

      - name: Build Snap
        id: build-snap
        uses: snapcore/action-build@v1
        with:
          path: .
          snapcraft-args: --build-for=${{ matrix.platform }}

      - name: Resolve Snap artifact
        id: snap-artifact
        run: |
          snap_path='${{ steps.build-snap.outputs.snap }}'
          if [ ! -f "$snap_path" ]; then
            echo "Missing snap artifact at $snap_path" >&2
            exit 1
          fi
          echo "path=$snap_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$snap_path")" >> "$GITHUB_OUTPUT"

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.snap-artifact.outputs.name }}
          path: ${{ steps.snap-artifact.outputs.path }}
